---
enabled: true
bindings:
  chat_enter_key_handler:
    keys:
      - enter
    description: send message or insert newline
    category: chat
    enabled: true
  chat_focus_attachments:
    keys:
      - ctrl+g
    description: focus the attached-snippets tree below the input (↑/↓ move · d remove · c clear · esc done)
    category: chat
    enabled: true
  clipboard_copy_text:
    keys:
      - ctrl+shift+c
    description: copy text
    category: clipboard
    enabled: true
  clipboard_paste_text:
    keys:
      - ctrl+v
    description: paste text
    category: clipboard
    enabled: true
  diff_viewer_cancel:
    keys:
      - esc
      - q
    description: close the changes panel / exit patch mode
    category: diff_viewer
    enabled: true
  diff_viewer_collapse:
    keys:
      - left
      - h
    description: collapse section/folder
    category: diff_viewer
    enabled: true
  diff_viewer_commit:
    keys:
      - c
    description: commit staged changes
    category: diff_viewer
    enabled: true
  diff_viewer_discard:
    keys:
      - d
    description: discard a file's working-tree changes
    category: diff_viewer
    enabled: true
  diff_viewer_edit:
    keys:
      - v
    description: edit the selected file (vim mode)
    category: diff_viewer
    enabled: true
  diff_viewer_expand:
    keys:
      - right
      - l
    description: expand section/folder
    category: diff_viewer
    enabled: true
  diff_viewer_halfpage_down:
    keys:
      - ctrl+d
    description: scroll the diff down half a page
    category: diff_viewer
    enabled: true
  diff_viewer_halfpage_up:
    keys:
      - ctrl+u
    description: scroll the diff up half a page
    category: diff_viewer
    enabled: true
  diff_viewer_hunk_next:
    keys:
      - ']'
    description: jump to the next hunk
    category: diff_viewer
    enabled: true
  diff_viewer_hunk_prev:
    keys:
      - '['
    description: jump to the previous hunk
    category: diff_viewer
    enabled: true
  diff_viewer_nav_down:
    keys:
      - down
      - j
    description: move selection down
    category: diff_viewer
    enabled: true
  diff_viewer_nav_up:
    keys:
      - up
      - k
    description: move selection up
    category: diff_viewer
    enabled: true
  diff_viewer_patch:
    keys:
      - p
    description: stage hunks (enter patch mode)
    category: diff_viewer
    enabled: true
  diff_viewer_patch_apply:
    keys:
      - a
      - u
      - enter
    description: apply the selected lines / current hunk
    category: diff_viewer
    enabled: true
  diff_viewer_patch_select:
    keys:
      - space
      - v
    description: start/clear a line-range selection
    category: diff_viewer
    enabled: true
  diff_viewer_patch_split:
    keys:
      - s
    description: split the current hunk into smaller pieces
    category: diff_viewer
    enabled: true
  diff_viewer_scroll_down:
    keys:
      - pgdown
      - pgdn
    description: scroll the diff down
    category: diff_viewer
    enabled: true
  diff_viewer_scroll_up:
    keys:
      - pgup
    description: scroll the diff up
    category: diff_viewer
    enabled: true
  diff_viewer_stage:
    keys:
      - a
    description: stage the selected file
    category: diff_viewer
    enabled: true
  diff_viewer_stage_all:
    keys:
      - A
    description: stage all files
    category: diff_viewer
    enabled: true
  diff_viewer_toggle:
    keys:
      - enter
      - space
    description: toggle section/folder collapse
    category: diff_viewer
    enabled: true
  diff_viewer_unstage:
    keys:
      - u
    description: unstage the selected file
    category: diff_viewer
    enabled: true
  diff_viewer_unstage_all:
    keys:
      - U
    description: unstage all files
    category: diff_viewer
    enabled: true
  display_toggle_raw_format:
    keys:
      - ctrl+r
    description: toggle raw/rendered markdown
    category: display
    enabled: true
  display_toggle_thinking:
    keys:
      - ctrl+k
    description: expand/collapse thinking blocks
    category: display
    enabled: true
  display_toggle_todo_box:
    keys:
      - ctrl+t
    description: toggle todo list
    category: display
    enabled: true
  explorer_annotate:
    keys:
      - a
    description: annotate the selected range with an instruction
    category: explorer
    enabled: true
  explorer_cancel:
    keys:
      - esc
      - q
    description: close the explorer panel
    category: explorer
    enabled: true
  explorer_collapse:
    keys:
      - left
      - h
    description: collapse the selected folder
    category: explorer
    enabled: true
  explorer_expand:
    keys:
      - right
      - l
    description: expand the selected folder
    category: explorer
    enabled: true
  explorer_find:
    keys:
      - /
    description: open the fuzzy file finder
    category: explorer
    enabled: true
  explorer_halfpage_down:
    keys:
      - ctrl+d
    description: scroll the preview down half a page
    category: explorer
    enabled: true
  explorer_halfpage_up:
    keys:
      - ctrl+u
    description: scroll the preview up half a page
    category: explorer
    enabled: true
  explorer_nav_down:
    keys:
      - down
      - j
    description: move selection down
    category: explorer
    enabled: true
  explorer_nav_up:
    keys:
      - up
      - k
    description: move selection up
    category: explorer
    enabled: true
  explorer_open:
    keys:
      - v
    description: open the selected file in your editor
    category: explorer
    enabled: true
  explorer_scroll_down:
    keys:
      - pgdown
      - pgdn
    description: scroll the preview down
    category: explorer
    enabled: true
  explorer_scroll_up:
    keys:
      - pgup
    description: scroll the preview up
    category: explorer
    enabled: true
  explorer_select:
    keys:
      - s
    description: enter line-selection mode on the previewed file
    category: explorer
    enabled: true
  explorer_submit:
    keys:
      - enter
    description: submit annotations and inject into chat
    category: explorer
    enabled: true
  explorer_toggle:
    keys:
      - enter
      - space
    description: expand/collapse a folder
    category: explorer
    enabled: true
  explorer_toggle_hidden:
    keys:
      - .
    description: show/hide hidden and ignored files
    category: explorer
    enabled: true
  explorer_toggle_select:
    keys:
      - space
      - v
    description: start/clear a line-range selection
    category: explorer
    enabled: true
  global_cancel:
    keys:
      - esc
    description: cancel current operation
    category: global
    enabled: true
  global_new_session:
    keys:
      - ctrl+l
    description: clear chat and start a new session
    category: global
    enabled: true
  global_quit:
    keys:
      - ctrl+c
    description: exit application
    category: global
    enabled: true
  help_toggle_help:
    keys:
      - '?'
    description: toggle help when input is empty
    category: help
    enabled: true
  mode_cycle_agent_mode:
    keys:
      - shift+tab
    description: cycle agent mode (Standard/Plan/Auto-Accept)
    category: mode
    enabled: true
  navigation_go_back_in_time:
    keys:
      - esc,esc
    description: go back in time to previous message (double ESC)
    category: navigation
    enabled: true
  navigation_page_down:
    keys:
      - pgdn
      - page_down
    description: page down
    category: navigation
    enabled: true
  navigation_page_up:
    keys:
      - pgup
      - page_up
    description: page up
    category: navigation
    enabled: true
  navigation_scroll_down_half_page:
    keys:
      - shift+down
    description: scroll down half page
    category: navigation
    enabled: true
  navigation_scroll_to_bottom:
    keys:
      - end
    description: scroll to bottom
    category: navigation
    enabled: true
  navigation_scroll_to_top:
    keys:
      - home
    description: scroll to top
    category: navigation
    enabled: true
  navigation_scroll_up_half_page:
    keys:
      - shift+up
    description: scroll up half page
    category: navigation
    enabled: true
  plan_approval_plan_approval_accept:
    keys:
      - enter
      - "y"
    description: accept plan
    category: plan_approval
    enabled: true
  plan_approval_plan_approval_accept_and_auto_approve:
    keys:
      - a
    description: accept plan and enable auto-approve mode
    category: plan_approval
    enabled: true
  plan_approval_plan_approval_left:
    keys:
      - left
      - h
    description: move selection left
    category: plan_approval
    enabled: true
  plan_approval_plan_approval_reject:
    keys:
      - "n"
    description: reject plan
    category: plan_approval
    enabled: true
  plan_approval_plan_approval_right:
    keys:
      - right
      - l
    description: move selection right
    category: plan_approval
    enabled: true
  selection_toggle_mouse_mode:
    keys:
      - ctrl+s
    description: toggle mouse scrolling/text selection
    category: selection
    enabled: true
  text_editing_backspace:
    keys:
      - backspace
    description: delete character
    category: text_editing
    enabled: true
  text_editing_delete_to_beginning:
    keys:
      - ctrl+u
    description: delete to beginning of line
    category: text_editing
    enabled: true
  text_editing_delete_word_backward:
    keys:
      - ctrl+w
    description: delete word backward
    category: text_editing
    enabled: true
  text_editing_delete_word_forward:
    keys:
      - alt+d
    description: delete word forward
    category: text_editing
    enabled: true
  text_editing_history_down:
    keys:
      - down
    description: navigate to next message in history
    category: text_editing
    enabled: true
  text_editing_history_up:
    keys:
      - up
    description: navigate to previous message in history
    category: text_editing
    enabled: true
  text_editing_insert_newline_alt:
    keys:
      - alt+enter
    description: insert newline
    category: text_editing
    enabled: true
  text_editing_insert_newline_ctrl:
    keys:
      - ctrl+j
    description: insert newline
    category: text_editing
    enabled: true
  text_editing_move_cursor_left:
    keys:
      - left
    description: move cursor left
    category: text_editing
    enabled: true
  text_editing_move_cursor_right:
    keys:
      - right
    description: move cursor right
    category: text_editing
    enabled: true
  text_editing_move_cursor_word_left:
    keys:
      - alt+left
      - ctrl+left
      - alt+b
    description: move cursor one word left
    category: text_editing
    enabled: true
  text_editing_move_cursor_word_right:
    keys:
      - alt+right
      - ctrl+right
      - alt+f
    description: move cursor one word right
    category: text_editing
    enabled: true
  text_editing_move_to_beginning:
    keys:
      - ctrl+a
    description: move cursor to beginning
    category: text_editing
    enabled: true
  text_editing_move_to_end:
    keys:
      - ctrl+e
    description: move cursor to end
    category: text_editing
    enabled: true
  tools_background_shell:
    keys:
      - ctrl+b
    description: move running bash command to background
    category: tools
    enabled: true
  tools_toggle_tool_expansion:
    keys:
      - ctrl+o
    description: expand/collapse tool results
    category: tools
    enabled: true
