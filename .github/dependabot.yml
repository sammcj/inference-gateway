---
version: 2
updates:
  - package-ecosystem: 'gomod'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 1
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - 'dependencies'
      - 'go'
    groups:
      opentelemetry:
        patterns:
          - 'go.opentelemetry.io/*'
      testing:
        patterns:
          - 'github.com/stretchr/testify'
          - 'go.uber.org/mock'
      uber:
        patterns:
          - 'go.uber.org/*'

  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 1
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - 'dependencies'
      - 'docker'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 1
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - 'dependencies'
      - 'github-actions'
    groups:
      github-actions:
        patterns:
          - '*'
