---
name: Claude Code

on:
  issue_comment:
    types:
      - created
  pull_request_review_comment:
    types:
      - created
  issues:
    types:
      - opened
      - assigned
  pull_request_review:
    types:
      - submitted

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: v2.12.2
          args: --help

      - name: Install task
        uses: arduino/setup-task@v2.0.0
        with:
          version: 3.48.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 'lts/*'

      - name: Install maintainer skill
        run: |
          mkdir -p ~/.claude/skills
          rm -rf ~/.claude/skills/maintainer
          curl -fsSL https://codeload.github.com/inference-gateway/skills/tar.gz/main |
            tar -xz --strip-components=2 -C ~/.claude/skills skills-main/skills/maintainer

      - name: Write MCP config
        run: |
          mkdir -p .claude
          cat > .claude/mcp.json <<'JSON'
          {
            "mcpServers": {
              "context7": {
                "command": "npx",
                "args": [
                  "-y",
                  "@upstash/context7-mcp@latest"
                ]
              }
            }
          }
          JSON

      - name: Determine branch prefix
        id: prefix
        env:
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          text="$(printf '%s %s' "$ISSUE_LABELS" "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]')"
          case "$text" in
            *bug*|*fix*|*defect*|*regression*|*hotfix*) prefix="fix/" ;;
            *feat*|*feature*|*enhancement*)             prefix="feat/" ;;
            *docs*|*documentation*)                     prefix="docs/" ;;
            *refactor*)                                 prefix="refactor/" ;;
            *)                                          prefix="claude/" ;;
          esac
          echo "Resolved branch prefix: $prefix"
          echo "value=$prefix" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          display_report: true
          additional_permissions: |
            actions: read
          use_commit_signing: true
          base_branch: main
          branch_prefix: ${{ steps.prefix.outputs.value }}
          claude_args: |
            --effort ultracode
            --model claude-opus-4-8
            --allowedTools "Bash(helm:*),Bash(task:*),Bash(go:*),Bash(gh:*),Bash(git:*),mcp__context7"
          prompt: |
            **IMPORTANT - WHEN WORKING ON ISSUES:**
            After you finish implementing the code changes and committing them, create a pull request:
            ```
            gh pr create --title "Your descriptive title" --body "## Summary
            Your summary of what was implemented.

            Closes #${{ github.event.issue.number }}"
            ```
            Always include a summary of changes AND "Closes #${{ github.event.issue.number }}" in the body.

            **COMMIT RULES:**
            - Do NOT add "Co-authored-by" lines to commits
            - Do NOT add "Generated with Claude Code" or similar attributions
            - Keep commits clean and professional

            **WHEN WORKING ON PR FEEDBACK:**
            Make the requested changes and commit. The PR will automatically update - do NOT create a new PR.

            **WHEN FIXING CI FAILURES:**
            Fix the issues, commit the fix. The CI will automatically re-run.

            **OUTPUT RULES:**

            ## Commit Message Requirements (max 72 chars)
            - Use conventional commit format with lowercase type (e.g., "fix:", "feat:", "refactor:")
          track_progress: true
