---
name: Claude Code

# Thin caller for the org-wide reusable @claude workflow.
# Source of truth: inference-gateway/.github/.github/workflows/claude.yml
# Inputs are managed centrally in inference-gateway/.github/repos.yaml (claude_targets).
# Do not hand-edit setup here; change the reusable workflow or repos.yaml instead.

on:
  issue_comment:
    types:
      - created
  pull_request_review_comment:
    types:
      - created
  issues:
    types:
      - opened
      - assigned
  pull_request_review:
    types:
      - submitted

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    # A called workflow's GITHUB_TOKEN is capped by the caller, so grant here.
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: inference-gateway/.github/.github/workflows/claude.yml@v0.2.1
    with:
      language: "go"
      node: true
      extra-tools: "Bash(helm:*)"
    secrets: inherit
