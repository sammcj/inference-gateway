        "pkg-path": "ctlptl",
        "version": "^0.9.4"
      },
      "curl": {
        "pkg-path": "curl",
        "version": "^8.20.0",
        "outputs": "all"
      },
      "docker": {
        "pkg-path": "docker",
        "version": "^29.6.0"
      },
      "docker-compose": {
        "pkg-path": "docker-compose",
        "version": "^5.3.0"
      },
      "gh": {
        "pkg-path": "gh",
        "version": "^2.96.0"
      },
      "git": {
        "pkg-path": "git",
        "version": "^2.54.0",
        "outputs": "all"
      },
      "go": {
        "pkg-path": "go",
        "pkg-group": "language",
        "version": "^1.26.4"
      },
      "go-task": {
        "pkg-path": "go-task",
        "version": "^3.48.0"
      },
      "golangci-lint": {
        "pkg-path": "golangci-lint",
        "version": "^2.12.2"
      },
      "goreleaser": {
        "pkg-path": "goreleaser",
        "version": "^2.16.0"
      },
      "infer": {
        "flake": "github:inference-gateway/cli/v0.133.0"
      },
      "jq": {
        "pkg-path": "jq",
        "version": "^1.8.1",
        "outputs": "all"
      },
      "k3d": {
        "pkg-path": "k3d",
        "version": "^5.9.0"
      },
      "kubectl": {
        "pkg-path": "kubectl",
        "version": "^1.36.2",
        "outputs": "all"
      },
      "kubernetes-helm": {
        "pkg-path": "kubernetes-helm",
        "version": "^4.2.2"
      },
      "markdownlint-cli": {
        "pkg-path": "markdownlint-cli",
        "version": "^0.49.0"
      },
      "mockgen": {
        "pkg-path": "mockgen",
        "version": "^0.6.0"
      },
