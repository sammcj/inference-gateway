---
services:
  inference-gateway:
    image: ghcr.io/inference-gateway/inference-gateway:latest
    ports:
      - 8080:8080
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 100M
        reservations:
          memory: 100M
          cpus: '0.1'
    networks:
      - app_network
      - external_network
    pull_policy: always

  # Optional local Ollama server. Off by default.
  # Start it explicitly with:  docker compose --profile ollama up -d
  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:8080
      OLLAMA_KEEP_ALIVE: '10m'
      OLLAMA_MAX_LOADED_MODELS: 2
      OLLAMA_FLASH_ATTENTION: 1
      OLLAMA_NUM_PARALLEL: 6
      OLLAMA_LLM_LIBRARY: cpu
      OLLAMA_MAX_QUEUE: 512
      OLLAMA_RUNNERS_DIR: /tmp
      OLLAMA_TMPDIR: /tmp
    healthcheck:
      test:
        - CMD
        - ollama
        - list
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    volumes:
      - type: volume
        source: docker-compose-ollama-data
        target: /root/.ollama
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 2G
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 8G
        reservations:
          memory: 6G
          cpus: '5'
    networks:
      - app_network

  ollama-model-downloader:
    image: ollama/ollama:latest
    profiles:
      - ollama
    entrypoint:
      - /bin/sh
      - -c
    command: >
      "
      ollama serve &
      sleep 10 &&
      ollama pull deepseek-r1:1.5b &&
      ollama pull qwen3:0.6b
      "
    volumes:
      - type: volume
        source: docker-compose-ollama-data
        target: /root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_MAX_LOADED_MODELS: 0
    networks:
      - app_network
      - external_network

  # Optional local llama.cpp server (OpenAI-compatible). Off by default: the
  # first start downloads a GGUF model from HuggingFace, which can take a while.
  # Start it explicitly with:  docker compose --profile llamacpp up -d
  # Pick a different model with LLAMACPP_MODEL in .env (any HuggingFace GGUF repo).
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles:
      - llamacpp
    command:
      - -hf
      - ${LLAMACPP_MODEL:-Qwen/Qwen2.5-0.5B-Instruct-GGUF:Q4_K_M}
      - --host
      - 0.0.0.0
      - --port
      - '8080'
    volumes:
      - type: volume
        source: docker-compose-llamacpp-cache
        target: /root/.cache/llama.cpp
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          memory: 2G
          cpus: '2'
    networks:
      - app_network
      - external_network

volumes:
  docker-compose-ollama-data:
  docker-compose-llamacpp-cache:

networks:
  app_network:
    internal: true
  external_network:
    internal: false
