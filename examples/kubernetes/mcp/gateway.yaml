---
apiVersion: v1
kind: Namespace
metadata:
  name: inference-gateway
  labels:
    inference-gateway.com/managed: 'true'
---
apiVersion: core.inference-gateway.com/v1alpha1
kind: Gateway
metadata:
  name: inference-gateway
  namespace: inference-gateway
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/instance: inference-gateway
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/part-of: inference-gateway
spec:
  environment: development
  image: 'ghcr.io/inference-gateway/inference-gateway:latest'
  telemetry:
    enabled: true
    metrics:
      enabled: true
      port: 9464
  server:
    host: '0.0.0.0'
    timeouts:
      read: '60s'
      write: '60s'
      idle: '300s'
  providers:
    - name: Groq
      enabled: true
      env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-secrets
              key: GROQ_API_KEY
    - name: OpenAI
      enabled: true
      env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-secrets
              key: OPENAI_API_KEY
    - name: Anthropic
      enabled: true
      env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-secrets
              key: ANTHROPIC_API_KEY
  # The three MCP servers are deployed as plain Deployments/Services (see the
  # time-server/, search-server/ and filesystem-server/ directories). They are
  # wired into the gateway as static MCP servers — the operator's documented
  # pattern for externally-hosted MCPs that have no MCP custom resource.
  mcp:
    enabled: true
    expose: true
    timeouts:
      client: '5s'
      dial: '3s'
      tlsHandshake: '3s'
      responseHeader: '3s'
      request: '5s'
    servers:
      - name: time-server
        url: 'http://mcp-time-server:8081/mcp'
      - name: search-server
        url: 'http://mcp-search-server:8082/mcp'
      - name: filesystem-server
        url: 'http://mcp-filesystem-server:8083/mcp'
  resources:
    requests:
      cpu: '100m'
      memory: '128Mi'
    limits:
      cpu: '1000m'
      memory: '512Mi'
  routing:
    enabled: true
    gateway:
      gatewayClassName: envoy
    httpRoute:
      hostnames:
        - api.inference-gateway.local
---
apiVersion: v1
kind: Secret
metadata:
  name: inference-gateway-secrets
  namespace: inference-gateway
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/instance: inference-gateway
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: inference-gateway
type: Opaque
stringData:
  GROQ_API_KEY: ''
  OPENAI_API_KEY: ''
  ANTHROPIC_API_KEY: ''
