version: '3'

vars:
  NAMESPACE: inference-gateway
  RELEASE_NAME: inference-gateway
  CLUSTER_NAME: mcp-cluster
  GATEWAY_API_VERSION: v1.5.1
  ENVOY_GATEWAY_VERSION: v1.2.0
  OPERATOR_VERSION: v0.16.3

tasks:
  default:
    desc: 'Show available options for the MCP Kubernetes deployment'
    silent: true
    cmds:
      - echo "🚀 MCP Kubernetes Deployment (operator-based)"
      - echo ""
      - echo "🎯 Common tasks:"
      - echo "   task deploy     - Deploy everything (infra, MCP servers, gateway)"
      - echo "   task test       - Run MCP integration tests"
      - echo "   task clean      - Tear everything down"
      - echo ""
      - echo "📋 Run 'task --list' to see all available tasks"

  validate-requirements:
    desc: 'Validate that all required tools are installed'
    silent: true
    cmds:
      - |
        command -v ctlptl >/dev/null 2>&1 || { echo "❌ ctlptl is required"; exit 1; }
        command -v kubectl >/dev/null 2>&1 || { echo "❌ kubectl is required"; exit 1; }
        command -v helm >/dev/null 2>&1 || { echo "❌ helm is required"; exit 1; }
        command -v docker >/dev/null 2>&1 || { echo "❌ docker is required"; exit 1; }
        command -v curl >/dev/null 2>&1 || { echo "❌ curl is required"; exit 1; }
        command -v jq >/dev/null 2>&1 || { echo "❌ jq is required"; exit 1; }
        echo "✅ All required tools are installed!"

  deploy-infrastructure:
    desc: 'Deploy infrastructure (k3d cluster, Gateway API, Envoy Gateway, operator)'
    deps:
      - validate-requirements
    cmds:
      - ctlptl apply -f Cluster.yaml
      - kubectl wait --for=condition=Ready nodes --all --timeout=300s
      - task: deploy-gateway-api
      - task: deploy-envoy-gateway
      - task: deploy-inference-gateway-operator
      - echo "🚀 Infrastructure deployed successfully!"

  deploy-gateway-api:
    desc: 'Install the Kubernetes Gateway API CRDs'
    cmds:
      - kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/{{.GATEWAY_API_VERSION}}/standard-install.yaml
      - echo "🌐 Gateway API CRDs installed successfully!"

  deploy-envoy-gateway:
    desc: 'Deploy Envoy Gateway and register the envoy GatewayClass'
    cmds:
      - |
        helm upgrade --install envoy-gateway \
          oci://docker.io/envoyproxy/gateway-helm \
          --version {{.ENVOY_GATEWAY_VERSION}} \
          --namespace envoy-gateway-system \
          --create-namespace \
          --skip-crds \
          --wait
      - kubectl -n envoy-gateway-system wait --for=condition=Available --timeout=120s deployment/envoy-gateway
      - |
        kubectl apply -f - <<'EOF'
        apiVersion: gateway.networking.k8s.io/v1
        kind: GatewayClass
        metadata:
          name: envoy
        spec:
          controllerName: gateway.envoyproxy.io/gatewayclass-controller
        EOF
      - echo "🚪 Envoy Gateway deployed successfully!"

  deploy-inference-gateway-operator:
    desc: 'Deploy the Inference Gateway operator'
    cmds:
      - kubectl apply -f https://github.com/inference-gateway/operator/releases/download/{{.OPERATOR_VERSION}}/install.yaml
      - kubectl -n inference-gateway-system wait --for=condition=Available --timeout=120s deployment/operator-inference-gateway
      - echo "🛠️ Inference Gateway operator deployed successfully!"

  build-mcp-servers:
    desc: 'Build the MCP servers (time, search, filesystem) and import them into k3d'
    cmds:
      - echo "🔨 Building MCP servers..."
      - cd time-server && docker build -t mcp-time-server:latest . && cd ..
      - cd search-server && docker build -t mcp-search-server:latest . && cd ..
      - cd filesystem-server && docker build -t mcp-filesystem-server:latest . && cd ..
      - |
        k3d image import \
          mcp-time-server:latest \
          mcp-search-server:latest \
          mcp-filesystem-server:latest \
          --cluster {{.CLUSTER_NAME}}
      - echo "🔧 MCP servers built and imported successfully!"

  deploy-mcp-servers:
    desc: 'Deploy the MCP servers and the MCP Inspector'
    cmds:
      - task: build-mcp-servers
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply --server-side -f -
      - kubectl apply -f filesystem-server/ -n {{.NAMESPACE}}
      - kubectl apply -f search-server/ -n {{.NAMESPACE}}
      - kubectl apply -f time-server/ -n {{.NAMESPACE}}
      - kubectl apply -f inspector.yaml
      - echo "🔧 MCP servers and inspector deployed successfully!"

  deploy-inference-gateway:
    desc: 'Deploy the Inference Gateway with MCP configuration via the operator'
    cmds:
      - kubectl apply -f gateway.yaml
      - echo "🚪 Inference Gateway with MCP deployed successfully!"
      - echo "ℹ️  Add your provider API keys to the inference-gateway-secrets Secret in gateway.yaml."

  deploy:
    desc: 'Deploy the complete MCP setup'
    cmds:
      - task: deploy-infrastructure
      - task: deploy-mcp-servers
      - task: wait
      - task: deploy-inference-gateway
      - echo "🎉 Complete MCP setup deployed successfully!"

  wait:
    desc: 'Wait for the MCP server pods to be ready'
    cmds:
      - kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=mcp-server -n {{.NAMESPACE}} --timeout=300s
      - echo "✅ MCP server pods are ready!"

  test:
    desc: 'Run MCP integration tests (health + tools discovery)'
    deps:
      - test:health
      - test:mcp-tools
    cmds:
      - echo "🎉 All MCP integration tests passed successfully!"

  test:health:
    desc: 'Test the gateway health endpoint in-cluster'
    cmds:
      - kubectl delete pod test-pod-01 --ignore-not-found=true -n {{.NAMESPACE}}
      - |
        kubectl run test-pod-01 --rm -i --restart=Never --image=curlimages/curl -n {{.NAMESPACE}} -- \
          curl -f http://{{.RELEASE_NAME}}:8080/health
      - echo "✅ Gateway is healthy"

  test:mcp-tools:
    desc: 'Test the MCP tools discovery endpoint in-cluster'
    cmds:
      - |
        kubectl run test-pod --rm -i --restart=Never --image=curlimages/curl -n {{.NAMESPACE}} -- \
          curl -s http://{{.RELEASE_NAME}}:8080/v1/mcp/tools
      - echo "✅ MCP tools endpoint working correctly"

  port-forward:
    desc: 'Forward the MCP Inspector to http://localhost:6274'
    cmds:
      - echo "MCP Inspector: http://localhost:6274 (Ctrl+C to stop)"
      - kubectl port-forward -n {{.NAMESPACE}} service/mcp-inspector 6274:6274

  port-forward-gateway:
    desc: 'Forward the Envoy data plane for the gateway to http://localhost:8080'
    cmds:
      - |
        ENVOY_SVC=$(kubectl get svc -n envoy-gateway-system \
          -l gateway.envoyproxy.io/owning-gateway-name=inference-gateway \
          -o jsonpath='{.items[0].metadata.name}')
        echo "Gateway: http://localhost:8080 (Host: api.inference-gateway.local)"
        kubectl -n envoy-gateway-system port-forward "svc/${ENVOY_SVC}" 8080:80

  logs:gateway:
    desc: 'Show logs from the inference gateway'
    cmds:
      - kubectl logs -l app={{.RELEASE_NAME}} -n {{.NAMESPACE}} --tail=100 -f

  restart:
    desc: 'Restart the gateway (e.g. after editing secrets)'
    cmds:
      - kubectl rollout restart deployment/{{.RELEASE_NAME}} -n {{.NAMESPACE}}
      - kubectl rollout status deployment/{{.RELEASE_NAME}} -n {{.NAMESPACE}}

  undeploy:
    desc: 'Remove the MCP components'
    cmds:
      - kubectl delete -f gateway.yaml --ignore-not-found=true
      - kubectl delete -f inspector.yaml --ignore-not-found=true
      - kubectl delete -f filesystem-server/ -n {{.NAMESPACE}} --ignore-not-found=true
      - kubectl delete -f search-server/ -n {{.NAMESPACE}} --ignore-not-found=true
      - kubectl delete -f time-server/ -n {{.NAMESPACE}} --ignore-not-found=true

  clean:
    desc: 'Clean up everything including the cluster'
    cmds:
      - ctlptl delete -f Cluster.yaml
      - echo "🧹 Everything cleaned up successfully!"
