---
apiVersion: v1
kind: Namespace
metadata:
  name: inference-gateway
  labels:
    inference-gateway.com/managed: 'true'
---
apiVersion: core.inference-gateway.com/v1alpha1
kind: Gateway
metadata:
  name: inference-gateway
  namespace: inference-gateway
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/instance: inference-gateway
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/part-of: inference-gateway
spec:
  environment: production
  image: 'ghcr.io/inference-gateway/inference-gateway:latest'
  telemetry:
    enabled: true
    metrics:
      enabled: true
      port: 9464
  server:
    host: '0.0.0.0'
    timeouts:
      read: '60s'
      write: '60s'
      idle: '300s'
  providers:
    - name: OpenAI
      enabled: true
      env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-secrets
              key: OPENAI_API_KEY
    - name: Anthropic
      enabled: true
      env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-secrets
              key: ANTHROPIC_API_KEY
    - name: DeepSeek
      enabled: true
      env:
        - name: DEEPSEEK_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-secrets
              key: DEEPSEEK_API_KEY
  resources:
    requests:
      cpu: '100m'
      memory: '128Mi'
    limits:
      cpu: '1000m'
      memory: '512Mi'
  routing:
    enabled: true
    gateway:
      gatewayClassName: envoy
      # Envoy terminates TLS at the Gateway listener. cert-manager issues the
      # certificate into `secretName` from the referenced ClusterIssuer.
      tls:
        enabled: true
        issuer: selfsigned-issuer
        secretName: api-inference-gateway-local-tls
    httpRoute:
      hostnames:
        - api.inference-gateway.local
---
apiVersion: v1
kind: Secret
metadata:
  name: inference-gateway-secrets
  namespace: inference-gateway
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/instance: inference-gateway
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: inference-gateway
type: Opaque
stringData:
  OPENAI_API_KEY: ''
  ANTHROPIC_API_KEY: ''
  DEEPSEEK_API_KEY: ''
