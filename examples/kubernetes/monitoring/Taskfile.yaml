---
version: '3'

vars:
  GATEWAY_API_VERSION: v1.5.1
  ENVOY_GATEWAY_VERSION: v1.2.0
  OPERATOR_VERSION: v0.16.3
  PROMETHEUS_STACK_VERSION: 72.6.2
  GRAFANA_OPERATOR_VERSION: 5.18.0

tasks:
  deploy-infrastructure:
    desc: 'Deploy monitoring infrastructure'
    cmds:
      - task: create-cluster
      - task: deploy-gateway-api
      - task: deploy-envoy-gateway
      - task: deploy-inference-gateway-operator
      - task: deploy-monitoring-stack
      - echo "📊 Monitoring infrastructure deployed successfully!"

  create-cluster:
    desc: 'Create a Kubernetes cluster using ctlptl'
    cmds:
      - ctlptl apply -f Cluster.yaml
      - echo "🛠️ Cluster created successfully!"

  deploy-gateway-api:
    desc: 'Install the Kubernetes Gateway API CRDs'
    cmds:
      - kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/{{.GATEWAY_API_VERSION}}/standard-install.yaml
      - echo "🌐 Gateway API CRDs installed successfully!"

  deploy-envoy-gateway:
    desc: 'Deploy Envoy Gateway and register the envoy GatewayClass'
    cmds:
      - |
        helm upgrade --install envoy-gateway \
          oci://docker.io/envoyproxy/gateway-helm \
          --version {{.ENVOY_GATEWAY_VERSION}} \
          --namespace envoy-gateway-system \
          --create-namespace \
          --skip-crds \
          --wait
      - kubectl -n envoy-gateway-system wait --for=condition=Available --timeout=120s deployment/envoy-gateway
      - |
        kubectl apply -f - <<'EOF'
        apiVersion: gateway.networking.k8s.io/v1
        kind: GatewayClass
        metadata:
          name: envoy
        spec:
          controllerName: gateway.envoyproxy.io/gatewayclass-controller
        EOF
      - echo "🚪 Envoy Gateway deployed successfully!"

  deploy-inference-gateway-operator:
    desc: 'Deploy the Inference Gateway operator'
    cmds:
      - kubectl apply -f https://github.com/inference-gateway/operator/releases/download/{{.OPERATOR_VERSION}}/install.yaml
      - kubectl -n inference-gateway-system wait --for=condition=Available --timeout=120s deployment/operator-inference-gateway
      - echo "🛠️ Inference Gateway operator deployed successfully!"

  deploy-monitoring-stack:
    desc: 'Deploy the Prometheus and Grafana operators and their resources'
    cmds:
      - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
      - helm repo add grafana https://grafana.github.io/helm-charts
      - helm repo update
      - |
        helm upgrade --install \
          --create-namespace \
          --namespace monitoring \
          --version {{.PROMETHEUS_STACK_VERSION}} \
          --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
          --set prometheus.prometheusSpec.podMonitorSelectorNilUsesHelmValues=false \
          --set-string prometheus.prometheusSpec.serviceMonitorNamespaceSelector.matchLabels.monitoring=true \
          --set prometheus.enabled=false \
          --set alertmanager.enabled=false \
          --set kubeStateMetrics.enabled=false \
          --set nodeExporter.enabled=false \
          --set grafana.enabled=false \
          --wait \
          prometheus-operator prometheus-community/kube-prometheus-stack
      - |
        helm upgrade --install \
          --create-namespace \
          --namespace monitoring \
          --version {{.GRAFANA_OPERATOR_VERSION}} \
          --wait \
          grafana-operator grafana/grafana-operator
      - kubectl label namespace monitoring monitoring="true" --overwrite
      - kubectl apply -f prometheus/
      - kubectl apply -f grafana/
      - echo "📈 Monitoring stack deployed successfully!"

  deploy-inference-gateway:
    desc: 'Deploy the Inference Gateway with monitoring and autoscaling via the operator'
    cmds:
      - kubectl apply -f gateway.yaml
      - echo "📈 Inference Gateway with monitoring and autoscaling deployed successfully!"

  port-forward:
    desc: 'Port-forward the Envoy data plane for the gateway to localhost:8080'
    cmds:
      - |
        ENVOY_SVC=$(kubectl get svc -n envoy-gateway-system \
          -l gateway.envoyproxy.io/owning-gateway-name=inference-gateway \
          -o jsonpath='{.items[0].metadata.name}')
        echo "Forwarding ${ENVOY_SVC} to http://localhost:8080"
        kubectl -n envoy-gateway-system port-forward "svc/${ENVOY_SVC}" 8080:80

  deploy-ollama:
    desc: 'Deploy ollama as a provider'
    cmds:
      - kubectl create namespace ollama --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -f ollama/
      - kubectl -n ollama rollout status deployment ollama
      - echo "🤖 Ollama provider deployed successfully!"

  pull-models:
    desc: 'Pull required models for testing'
    cmds:
      - echo "📥 Pulling required models..."
      - |
        kubectl exec -n ollama deployment/ollama -- ollama pull deepseek-r1:1.5b
      - |
        kubectl exec -n ollama deployment/ollama -- ollama pull llama3.2:1b
      - echo "✅ Models pulled successfully!"

  simulate-requests:
    desc: 'Generate test requests to simulate monitoring (requires `task port-forward` running)'
    cmds:
      - |
        for i in $(seq 1 20); do
          # Alternate between the two available models so per-model panels show both.
          if [ $((i % 2)) -eq 0 ]; then
            MODEL="ollama/llama3.2:1b"
          else
            MODEL="ollama/deepseek-r1:1.5b"
          fi
          curl -s -X POST http://localhost:8080/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Host: api.inference-gateway.local" \
            -d '{"model":"'"${MODEL}"'","messages":[{"role":"user","content":"Say hello"}]}' \
            --max-time 15
          echo
          sleep 1
        done
      - echo "🧪 Test requests completed successfully!"

  simulate-infer-push:
    desc: 'Push OTLP metrics simulating a Claude Code subscription client (requires `task port-forward` running and TELEMETRY_METRICS_PUSH_ENABLE=true)'
    cmds:
      - |
        TEAMS=("platform" "data" "ml" "infra" "security")
        for i in $(seq 1 10); do
          INPUT_TOKENS=$((RANDOM % 4000 + 500))
          OUTPUT_TOKENS=$((RANDOM % 1500 + 100))
          TOOL_CALLS=$((RANDOM % 4 + 1))
          TOOL_DURATION=$(awk "BEGIN{print $((RANDOM % 2000 + 50))/1000}")
          OPERATION_DURATION=$(awk "BEGIN{print $((RANDOM % 20000 + 2000))/1000}")
          TTFT=$(awk "BEGIN{print $((RANDOM % 1500 + 200))/1000}")
          # Rotate through example teams so the dashboards demonstrate team attribution.
          TEAM="${TEAMS[$((i % ${#TEAMS[@]}))]}"
          # Roughly 1-in-5 tool executions fails with a timeout.
          if [ $((RANDOM % 5)) -eq 0 ]; then
            TOOL_ERROR_ATTR='{ "key": "error.type", "value": { "stringValue": "timeout" } },'
            TOOL_RESULT="failure"
          else
            TOOL_ERROR_ATTR=""
            TOOL_RESULT="success"
          fi
          curl -s -X POST http://localhost:8080/v1/metrics \
            -H "Content-Type: application/json" \
            -H "Host: api.inference-gateway.local" \
            --max-time 10 \
            -d '{
              "resourceMetrics": [{
                "resource": {
                  "attributes": [
                    { "key": "service.name", "value": { "stringValue": "infer-cli" } }
                  ]
                },
                "scopeMetrics": [{
                  "metrics": [
                    {
                      "name": "gen_ai.client.token.usage",
                      "unit": "{token}",
                      "sum": {
                        "aggregationTemporality": 1,
                        "isMonotonic": true,
                        "dataPoints": [
                          {
                            "asInt": "'"${INPUT_TOKENS}"'",
                            "attributes": [
                              { "key": "source", "value": { "stringValue": "claude-code-subscription" } },
                              { "key": "team", "value": { "stringValue": "'"${TEAM}"'" } },
                              { "key": "gen_ai.provider.name", "value": { "stringValue": "anthropic" } },
                              { "key": "gen_ai.request.model", "value": { "stringValue": "claude-sonnet-5" } },
                              { "key": "gen_ai.token.type", "value": { "stringValue": "input" } }
                            ]
                          },
                          {
                            "asInt": "'"${OUTPUT_TOKENS}"'",
                            "attributes": [
                              { "key": "source", "value": { "stringValue": "claude-code-subscription" } },
                              { "key": "team", "value": { "stringValue": "'"${TEAM}"'" } },
                              { "key": "gen_ai.provider.name", "value": { "stringValue": "anthropic" } },
                              { "key": "gen_ai.request.model", "value": { "stringValue": "claude-sonnet-5" } },
                              { "key": "gen_ai.token.type", "value": { "stringValue": "output" } }
                            ]
                          }
                        ]
                      }
                    },
                    {
                      "name": "gen_ai.client.operation.duration",
                      "unit": "s",
                      "histogram": {
                        "aggregationTemporality": 1,
                        "dataPoints": [
                          {
                            "count": "1",
                            "sum": '"${OPERATION_DURATION}"',
                            "attributes": [
                              { "key": "source", "value": { "stringValue": "claude-code-subscription" } },
                              { "key": "team", "value": { "stringValue": "'"${TEAM}"'" } },
                              { "key": "gen_ai.provider.name", "value": { "stringValue": "anthropic" } },
                              { "key": "gen_ai.request.model", "value": { "stringValue": "claude-sonnet-5" } }
                            ]
                          }
                        ]
                      }
                    },
                    {
                      "name": "gen_ai.client.operation.time_to_first_chunk",
                      "unit": "s",
                      "histogram": {
                        "aggregationTemporality": 1,
                        "dataPoints": [
                          {
                            "count": "1",
                            "sum": '"${TTFT}"',
                            "attributes": [
                              { "key": "source", "value": { "stringValue": "claude-code-subscription" } },
                              { "key": "team", "value": { "stringValue": "'"${TEAM}"'" } },
                              { "key": "gen_ai.provider.name", "value": { "stringValue": "anthropic" } },
                              { "key": "gen_ai.request.model", "value": { "stringValue": "claude-sonnet-5" } }
                            ]
                          }
                        ]
                      }
                    },
                    {
                      "name": "gen_ai.execute_tool.duration",
                      "unit": "s",
                      "histogram": {
                        "aggregationTemporality": 1,
                        "dataPoints": [
                          {
                            "count": "1",
                            "sum": '"${TOOL_DURATION}"',
                            "attributes": [
                              '"${TOOL_ERROR_ATTR}"'
                              { "key": "source", "value": { "stringValue": "claude-code-subscription" } },
                              { "key": "team", "value": { "stringValue": "'"${TEAM}"'" } },
                              { "key": "gen_ai.provider.name", "value": { "stringValue": "anthropic" } },
                              { "key": "gen_ai.request.model", "value": { "stringValue": "claude-sonnet-5" } },
                              { "key": "gen_ai.tool.name", "value": { "stringValue": "Bash" } },
                              { "key": "gen_ai.tool.type", "value": { "stringValue": "function" } }
                            ]
                          }
                        ]
                      }
                    },
                    {
                      "name": "inference_gateway.tool_calls",
                      "unit": "{call}",
                      "sum": {
                        "aggregationTemporality": 1,
                        "isMonotonic": true,
                        "dataPoints": [
                          {
                            "asInt": "'"${TOOL_CALLS}"'",
                            "attributes": [
                              { "key": "source", "value": { "stringValue": "claude-code-subscription" } },
                              { "key": "team", "value": { "stringValue": "'"${TEAM}"'" } },
                              { "key": "gen_ai.provider.name", "value": { "stringValue": "anthropic" } },
                              { "key": "gen_ai.request.model", "value": { "stringValue": "claude-sonnet-5" } },
                              { "key": "gen_ai.tool.name", "value": { "stringValue": "Bash" } },
                              { "key": "gen_ai.tool.type", "value": { "stringValue": "function" } }
                            ]
                          }
                        ]
                      }
                    }
                  ]
                }]
              }]
            }'
          echo " pushed ${INPUT_TOKENS} input / ${OUTPUT_TOKENS} output tokens, ${TOOL_CALLS} tool calls, tool exec ${TOOL_RESULT} (${TOOL_DURATION}s) [team=${TEAM}]"
          sleep 2
        done
      - echo "📤 Claude subscription metrics pushed successfully!"

  simulate-tool-call-requests:
    desc: 'Generate test requests with tool/function calls (requires `task port-forward` running)'
    cmds:
      - |
        for i in $(seq 1 10); do
          curl -s -X POST http://localhost:8080/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Host: api.inference-gateway.local" \
            -d '{
              "model": "ollama/llama3.2:1b",
              "messages": [
                {
                  "role": "user",
                  "content": "What is the weather like in New York? Use the weather tool to check."
                }
              ],
              "tools": [
                {
                  "type": "function",
                  "function": {
                    "name": "get_weather",
                    "description": "Get the current weather for a location",
                    "parameters": {
                      "type": "object",
                      "properties": {
                        "location": {
                          "type": "string",
                          "description": "The city and state, e.g. San Francisco, CA"
                        }
                      },
                      "required": ["location"]
                    }
                  }
                }
              ],
              "tool_choice": "auto"
            }' \
            --max-time 15
          echo
          sleep 2
        done
      - echo "🛠️ Tool call test requests completed successfully!"

  clean:
    desc: 'Clean up the cluster'
    cmds:
      - ctlptl delete -f Cluster.yaml
      - echo "🧹 Cluster cleaned up successfully!"
