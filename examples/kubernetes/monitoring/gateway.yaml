---
apiVersion: v1
kind: Namespace
metadata:
  name: inference-gateway
  labels:
    inference-gateway.com/managed: 'true'
    # Picked up by the Prometheus serviceMonitorNamespaceSelector.
    monitoring: 'true'
---
apiVersion: core.inference-gateway.com/v1alpha1
kind: Gateway
metadata:
  name: inference-gateway
  namespace: inference-gateway
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/instance: inference-gateway
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/part-of: inference-gateway
spec:
  environment: production
  image: 'ghcr.io/inference-gateway/inference-gateway:latest'
  telemetry:
    enabled: true
    metrics:
      enabled: true
      port: 9464
  hpa:
    enabled: true
    config:
      minReplicas: 2
      maxReplicas: 10
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 80
        - type: Resource
          resource:
            name: memory
            target:
              type: Utilization
              averageUtilization: 80
  server:
    host: '0.0.0.0'
    timeouts:
      read: '60s'
      write: '60s'
      idle: '300s'
  providers:
    - name: Ollama
      enabled: true
      env:
        - name: OLLAMA_API_URL
          value: 'http://ollama.ollama:8080/v1'
        # TODO: move this config to CRD in the operator repoistory
        - name: TELEMETRY_METRICS_PUSH_ENABLE
          value: 'true'
  resources:
    requests:
      cpu: '100m'
      memory: '128Mi'
    limits:
      cpu: '1000m'
      memory: '512Mi'
  routing:
    enabled: true
    gateway:
      gatewayClassName: envoy
    httpRoute:
      hostnames:
        - api.inference-gateway.local
---
# The operator-managed Service carries no labels, so this thin Service exposes the
# pods' metrics port (9464) with a label the ServiceMonitor selects on.
apiVersion: v1
kind: Service
metadata:
  name: inference-gateway-metrics
  namespace: inference-gateway
  labels:
    app.kubernetes.io/name: inference-gateway
spec:
  selector:
    app: inference-gateway
  ports:
    - name: metrics
      port: 9464
      targetPort: 9464
      protocol: TCP
