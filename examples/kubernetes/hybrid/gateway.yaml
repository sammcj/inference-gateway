---
apiVersion: v1
kind: Namespace
metadata:
  name: inference-gateway
  labels:
    inference-gateway.com/managed: 'true'
---
apiVersion: core.inference-gateway.com/v1alpha1
kind: Gateway
metadata:
  name: inference-gateway
  namespace: inference-gateway
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/instance: inference-gateway
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/part-of: inference-gateway
spec:
  environment: production
  image: 'ghcr.io/inference-gateway/inference-gateway:latest'
  telemetry:
    enabled: true
    metrics:
      enabled: true
      port: 9464
  server:
    host: '0.0.0.0'
    timeouts:
      read: '60s'
      write: '60s'
      idle: '300s'
  providers:
    # Local provider: Ollama running inside the cluster. The base URL is passed
    # straight through to the gateway container via the provider env list.
    - name: Ollama
      enabled: true
      env:
        - name: OLLAMA_API_URL
          value: 'http://ollama.ollama:8080/v1'
    # Optional local provider: llama.cpp server. Deploy it with `task deploy-llamacpp`,
    # then uncomment this block and re-apply. Requires an operator release that knows
    # the `Llamacpp` provider (schemas >= v0.6.1).
    # - name: Llamacpp
    #   enabled: true
    #   env:
    #     - name: LLAMACPP_API_URL
    #       value: 'http://llamacpp.llamacpp:8080/v1'
    # Cloud providers: API keys are read from the inference-gateway-secrets Secret.
    - name: Groq
      enabled: true
      env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-secrets
              key: GROQ_API_KEY
    - name: Anthropic
      enabled: true
      env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-secrets
              key: ANTHROPIC_API_KEY
  resources:
    requests:
      cpu: '100m'
      memory: '128Mi'
    limits:
      cpu: '1000m'
      memory: '512Mi'
  routing:
    enabled: true
    gateway:
      gatewayClassName: envoy
    httpRoute:
      hostnames:
        - api.inference-gateway.local
---
apiVersion: v1
kind: Secret
metadata:
  name: inference-gateway-secrets
  namespace: inference-gateway
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/instance: inference-gateway
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: inference-gateway
type: Opaque
stringData:
  GROQ_API_KEY: ''
  ANTHROPIC_API_KEY: ''
