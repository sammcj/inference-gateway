---
version: '3'

vars:
  GATEWAY_API_VERSION: v1.5.1
  OPERATOR_VERSION: v0.16.3

tasks:
  deploy-infrastructure:
    desc: 'Deploy cluster, registry, Gateway API CRDs and the operator'
    cmds:
      - ctlptl apply -f Cluster.yaml
      - task: deploy-gateway-api
      - task: deploy-inference-gateway-operator
      - echo "🚀 Infrastructure with registry deployed successfully!"

  deploy-gateway-api:
    # The operator watches Gateway API resources, so their CRDs must be present
    # for it to start — even though this example does not expose the gateway.
    desc: 'Install the Kubernetes Gateway API CRDs (required by the operator)'
    cmds:
      - kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/{{.GATEWAY_API_VERSION}}/standard-install.yaml
      - echo "🌐 Gateway API CRDs installed successfully!"

  deploy-inference-gateway-operator:
    desc: 'Deploy the Inference Gateway operator'
    cmds:
      - kubectl apply -f https://github.com/inference-gateway/operator/releases/download/{{.OPERATOR_VERSION}}/install.yaml
      - kubectl -n inference-gateway-system wait --for=condition=Available --timeout=120s deployment/operator-inference-gateway
      - echo "🛠️ Inference Gateway operator deployed successfully!"

  build-logs-analyzer-agent:
    desc: 'Build and push logs analyzer image'
    cmds:
      - docker build -t localhost:5000/dummyrepo/logs-analyzer:latest ./logs-analyzer
      - docker push localhost:5000/dummyrepo/logs-analyzer:latest
      - echo "🏗️ Logs analyzer image built and pushed successfully!"

  deploy-logs-analyzer-agent:
    desc: 'Deploy logs analyzer and test deployment'
    cmds:
      - kubectl apply -f logs-analyzer/
      - kubectl apply -f failing-deployment/
      - echo "🔍 Logs analyzer and test deployment deployed successfully!"

  delete-logs-analyzer-agent:
    desc: 'Delete logs analyzer and test deployment'
    cmds:
      - kubectl delete -f logs-analyzer/
      - kubectl delete -f failing-deployment/
      - echo "🧹 Logs analyzer and test deployment deleted successfully!"

  deploy-inference-gateway:
    desc: 'Deploy the Inference Gateway via the operator'
    cmds:
      - kubectl apply -f gateway.yaml
      - echo "🚪 Inference Gateway deployed successfully!"
      - echo "ℹ️  Add your GROQ_API_KEY to the inference-gateway-secrets Secret in gateway.yaml."

  clean:
    desc: 'Clean up the cluster'
    cmds:
      - ctlptl delete -f Cluster.yaml
      - echo "🧹 Cluster cleaned up successfully!"
