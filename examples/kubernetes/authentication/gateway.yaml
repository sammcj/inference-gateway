---
apiVersion: v1
kind: Namespace
metadata:
  name: inference-gateway
  labels:
    inference-gateway.com/managed: 'true'
---
apiVersion: core.inference-gateway.com/v1alpha1
kind: Gateway
metadata:
  name: inference-gateway
  namespace: inference-gateway
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/instance: inference-gateway
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/part-of: inference-gateway
spec:
  environment: production
  image: 'ghcr.io/inference-gateway/inference-gateway:latest'
  telemetry:
    enabled: true
    metrics:
      enabled: true
      port: 9464
  server:
    host: '0.0.0.0'
    timeouts:
      read: '60s'
      write: '60s'
      idle: '300s'
  # OIDC authentication against Keycloak. The operator emits AUTH_ENABLE,
  # AUTH_OIDC_ISSUER, AUTH_OIDC_CLIENT_ID and AUTH_OIDC_CLIENT_SECRET, and — via
  # caCertRef — mounts Keycloak's self-signed CA and points SSL_CERT_FILE at it so
  # OIDC discovery over HTTPS is trusted.
  auth:
    enabled: true
    provider: oidc
    oidc:
      issuerUrl: 'https://keycloak.inference-gateway.local:8543/realms/inference-gateway-realm'
      clientId: inference-gateway-client
      clientSecretRef:
        name: inference-gateway-auth
        key: AUTH_OIDC_CLIENT_SECRET
      caCertRef:
        name: keycloak-ca
        key: ca.crt
  providers:
    - name: OpenAI
      enabled: true
      env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-secrets
              key: OPENAI_API_KEY
    - name: Groq
      enabled: true
      env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-secrets
              key: GROQ_API_KEY
  resources:
    requests:
      cpu: '100m'
      memory: '128Mi'
    limits:
      cpu: '1000m'
      memory: '512Mi'
  routing:
    enabled: true
    gateway:
      gatewayClassName: envoy
      tls:
        enabled: true
        issuer: selfsigned-issuer
        secretName: api-inference-gateway-local-tls
    httpRoute:
      hostnames:
        - api.inference-gateway.local
---
apiVersion: v1
kind: Secret
metadata:
  name: inference-gateway-auth
  namespace: inference-gateway
type: Opaque
stringData:
  # Must match the client secret of the inference-gateway-client in the realm
  # (see keycloak/job-import-realm.yaml).
  AUTH_OIDC_CLIENT_SECRET: very-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: inference-gateway-secrets
  namespace: inference-gateway
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/instance: inference-gateway
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: inference-gateway
type: Opaque
stringData:
  OPENAI_API_KEY: ''
  GROQ_API_KEY: ''
