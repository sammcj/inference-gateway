---
version: '3'

tasks:
  default:
    desc: 'Show available tasks'
    cmds:
      - task --list

  mcp:schema:download:
    desc: 'Download the MCP schema (pin with SCHEMAS_REF=refs/tags/vX.Y.Z, a branch ref, or a SHA)'
    cmds:
      - curl -fsSL -o internal/mcp/mcp-schema.json "https://raw.githubusercontent.com/inference-gateway/schemas/{{.SCHEMAS_REF | default "refs/heads/main"}}/mcp/mcp-schema.json"
      - curl -fsSL -o internal/mcp/mcp-schema.yaml "https://raw.githubusercontent.com/inference-gateway/schemas/{{.SCHEMAS_REF | default "refs/heads/main"}}/mcp/mcp-schema.yaml"
      - task: format

  generate:
    desc: 'Generate the gateway from OpenAPI Spec'
    cmds:
      - go run cmd/generate/main.go -type ProvidersClientConfig -output providers/client/client.go
      - go run cmd/generate/main.go -type ProvidersConstants -output providers/constants/constants.go
      - go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.8.0 --config=.oapi-codegen.yaml -o providers/types/common_types.go openapi.yaml
      - gofmt -r 'interface{} -> any' -w providers/types/common_types.go
      - go run cmd/generate/main.go -type Providers -output providers/transformers
      - go run cmd/generate/main.go -type ProviderRegistry -output providers/registry/registry.go
      - go run cmd/generate/main.go -type Config -output config/config.go
      - go run cmd/generate/main.go -type MD -output Configurations.md
      - go run cmd/generate/main.go -type Env -output examples/docker-compose/basic/.env.example
      - go run cmd/generate/main.go -type Env -output examples/docker-compose/hybrid/.env.example
      - go run cmd/generate/main.go -type Env -output examples/docker-compose/tools/.env.example
      - go run cmd/generate/main.go -type Env -output examples/docker-compose/authentication/.env.example
      - go run cmd/generate/main.go -type Env -output examples/docker-compose/mcp/.env.example
      - go run cmd/generate/main.go -type Env -output examples/docker-compose/monitoring/.env.example
      - go run cmd/generate/main.go -type MCPWrap -output internal/mcp/mcp-schema.openapi.yaml
      - go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.8.0 --config=.oapi-codegen.mcp.yaml -o internal/mcp/generated_types.go internal/mcp/mcp-schema.openapi.yaml
      - gofmt -r 'interface{} -> any' -w internal/mcp/generated_types.go
      - rm -f internal/mcp/mcp-schema.openapi.yaml
      - go generate ./providers/... ./api/... ./otel/... ./logger/... ./internal/mcp/...
      - task: format
      - echo "✅ Codegen completed successfully!"

  pricing:sync:
    desc: 'Sync the community model-pricing fallback table from models.dev (needs network + gh); commit the regenerated JSON'
    cmds:
      - gh api repos/sst/models.dev/tarball > /tmp/models.dev.tar.gz
      - go run cmd/generate/main.go -type CommunityPricing -input /tmp/models.dev.tar.gz -output providers/core/community_pricing.json
      - rm -f /tmp/models.dev.tar.gz

  contextwindow:sync:
    desc: 'Sync the community context-window fallback table from models.dev (needs network + gh); commit the regenerated JSON'
    cmds:
      - gh api repos/sst/models.dev/tarball > /tmp/models.dev.tar.gz
      - go run cmd/generate/main.go -type CommunityContextWindows -input /tmp/models.dev.tar.gz -output providers/core/community_context_windows.json
      - rm -f /tmp/models.dev.tar.gz

  tidy:
    desc: 'Tidy the gateway'
    cmds:
      - find . -name 'go.mod' -execdir go mod tidy \;

  build:
    desc: 'Build the gateway'
    cmds:
      - go build -o bin/inference-gateway cmd/gateway/main.go

  build:container:
    desc: 'Build the gateway container'
    cmds:
      - docker build -t inference-gateway .

  run:
    desc: 'Run the gateway'
    cmds:
      - go run cmd/gateway/main.go

  format:
    desc: 'Format the code'
    cmds:
      - prettier --write .
      - go fmt ./...

  lint:
    desc: 'Run Go static analysis and linting'
    cmds:
      - golangci-lint run
      - markdownlint . --ignore '{AGENTS,CLAUDE,CHANGELOG}.md' --ignore '**/node_modules/**' --ignore Configurations.md --fix

  openapi:lint:
    desc: 'Lint OpenAPI spec'
    cmds:
      - npx @stoplight/spectral@6.5.0 lint --verbose openapi.yaml

  openapi:download:
    desc: 'Download the latest OpenAPI Spec (alias of oas-download)'
    cmds:
      - task: oas-download

  oas-download:
    desc: 'Download OpenAPI specification (pin with SCHEMAS_REF=refs/tags/vX.Y.Z, a branch ref, or a SHA)'
    cmds:
      - curl -fsSL -o openapi.yaml "https://raw.githubusercontent.com/inference-gateway/schemas/{{.SCHEMAS_REF | default "refs/heads/main"}}/openapi.yaml"

  oas-sync:
    desc: 'Fetch the OpenAPI spec (pin with SCHEMAS_REF) and regenerate the gateway'
    cmds:
      - task: oas-download
      - task: generate

  test:
    desc: 'Run tests'
    cmds:
      - go test -race -v ./...

  benchmark:
    desc: 'Run benchmarks'
    cmds:
      - go test -bench=. -run=^$ -benchmem -benchtime=100x -count=20 ./tests/...

  pre-commit:install:
    desc: 'Install git hooks from .githooks/'
    cmds:
      - echo "Installing git hooks from .githooks/..."
      - chmod +x .githooks/pre-commit
      - git config core.hooksPath .githooks
      - echo "✅ Git hooks installed successfully! (core.hooksPath = .githooks)"

  pre-commit:uninstall:
    desc: 'Uninstall git hooks'
    cmds:
      - git config --unset core.hooksPath || true
      - echo "✅ Git hooks uninstalled successfully!"

  package:
    desc: 'Package the gateway'
    cmds:
      - docker build -t inference-gateway .

  release-dry-run:
    desc: 'Run a dry-run of both semantic-release and goreleaser'
    cmds:
      - echo "Running semantic-release dry run..."
      - semantic-release --dry-run
      - echo "Running goreleaser dry run..."
      - goreleaser release --config .goreleaser.yaml --clean --snapshot --verbose
